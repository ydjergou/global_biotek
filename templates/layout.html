<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Biotek - Plateforme IA Anti-Résistance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f8f9fa; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .navbar { background-color: #a9f0e3; }
        .navbar-brand { font-weight: bold; color: #09090a !important; display: flex; align-items: center; }
        .navbar-logo { height: 40px; margin-right: 10px; }
        .nav-link { color: #0c0c0c !important; }
        .nav-link.active { color: #fff !important; font-weight: bold; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status-sensible { background-color: #d4edda; color: #155724; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        .status-resistant { background-color: #f8d7da; color: #721c24; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        .status-incertain { background-color: #fff3cd; color: #856404; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        footer { background-color: #a9f0e3; border-top: 1px solid #dcdccc; color: #060606; padding: 5px 0; }
        .main-content { flex: 1; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{{ url_for('static', filename='img/image.png') }}" alt="Logo" class="navbar-logo">
                Global Biotek
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Accueil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/recommendation' %}active{% endif %}" href="/recommendation">Recommandation</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/heatmap' %}active{% endif %}" href="/heatmap">Heatmap</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/statistics' %}active{% endif %}" href="/statistics">Statistiques</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/about' %}active{% endif %}" href="/about">À propos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4 main-content">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <div class="container text-center">
            <p>&copy; 2026 Global Biotek - Aide à la décision thérapeutique en Afrique de l'Ouest.</p>
            <small class="text-warning">Attention : Cet outil est une aide à la décision. L'avis médical prévaut.</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
